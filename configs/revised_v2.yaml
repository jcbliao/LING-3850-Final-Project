# Revised config v2 — input-conditional gates with Lagrangian constraint
# Key change: l0_mode=conditional replaces static gates with per-input gating
data_path: "../data/RevisitPinkerAndPrince/experiment_1/english_merged.txt"
use_phonological: true
seed: 42

# Model — reduced capacity
d_model: 64
nhead: 4
enc_layers: 2
dec_layers: 2
d_ff: 128
num_slots: 4
slot_iters: 3
dropout: 0.3

# L0Drop — input-conditional with Lagrangian constraint
l0_mode: conditional
target_l0: 2.0
lagrangian_lr: 0.01
l0_beta: 0.66

# Multi-task reconstruction
alpha_recon: 0.5

# Training
batch_size: 32
lr: 3.0e-4
weight_decay: 1.0e-4
epochs: 200
patience: 25

# Output
save_dir: "../checkpoints"
results_dir: "../results"
plot_every: 5
