# v10a: BiLSTM encoder + LSTM decoder (K&C replication), no slots
data_path: "../data/RevisitPinkerAndPrince/experiment_1/english_merged.txt"
use_phonological: true
seed: 42

encoder_type: bilstm
decoder_type: lstm
use_slots: false
use_copy: false

d_model: 128
nhead: 4
enc_layers: 2
dec_layers: 2
d_ff: 256
dropout: 0.3
alpha_recon: 0.0

batch_size: 32
lr: 1.0e-3
weight_decay: 1.0e-4
epochs: 300
patience: 30

save_dir: "../checkpoints/v10a_bilstm_no_slots"
results_dir: "../results/v10a_bilstm_no_slots"
plot_every: 5
