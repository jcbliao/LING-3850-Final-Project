# v12a: Developmental L0 annealing — natural data
# Phase 1 (epochs 1-49): all 4 slots open, learn rules + exceptions
# Phase 2 (epochs 50-99): anneal target_l0 from 4 → 2 (gradual pruning)
# Phase 3 (epochs 100+): hold at target_l0=2
data_path: "../data/RevisitPinkerAndPrince/experiment_1/english_merged.txt"
use_phonological: true
seed: 42

encoder_type: bilstm
decoder_type: lstm
use_slots: true
use_copy: false

d_model: 128
nhead: 4
enc_layers: 2
dec_layers: 2
d_ff: 256
num_slots: 4
slot_iters: 3
slot_nhead: 4
dropout: 0.3

l0_mode: conditional
target_l0: 2.0
l0_anneal_start: 50
l0_anneal_epochs: 50
lagrangian_lr: 0.01
l0_beta: 0.66

alpha_recon: 0.0
training_regime: natural

batch_size: 32
lr: 1.0e-3
weight_decay: 1.0e-4
epochs: 300
patience: 50

save_dir: "../checkpoints/v12a_anneal_natural"
results_dir: "../results/v12a_anneal_natural"
plot_every: 5
