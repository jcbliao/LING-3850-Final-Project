# v14d: Small LSTM hidden + oversample, no anneal, target_l0=4 (all slots open)
# Tests whether L0 pruning helps or hurts when decoder is already constrained
data_path: "../data/RevisitPinkerAndPrince/experiment_1/english_merged.txt"
use_phonological: true
seed: 42

encoder_type: bilstm
decoder_type: lstm
use_slots: true
use_copy: false
lstm_hidden: 32

d_model: 128
nhead: 4
enc_layers: 2
dec_layers: 2
d_ff: 256
num_slots: 4
slot_iters: 3
slot_nhead: 4
dropout: 0.3

l0_mode: conditional
target_l0: 4.0
lagrangian_lr: 0.01
l0_beta: 0.66

alpha_recon: 0.0
training_regime: oversample

batch_size: 32
lr: 1.0e-3
weight_decay: 1.0e-4
epochs: 300
patience: 30

save_dir: "../checkpoints/v14d_small_lstm_no_prune"
results_dir: "../results/v14d_small_lstm_no_prune"
plot_every: 5
