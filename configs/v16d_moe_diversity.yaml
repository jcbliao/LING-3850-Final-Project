# v16d: MoE with diversity loss (lateral inhibition) — soft routing
# Based on v16a (best so far) + diversity loss to force expert specialization.
# No labels used for routing — experts are pushed apart purely by
# penalizing similar outputs (analogous to lateral inhibition in neural circuits).
data_path: "../data/RevisitPinkerAndPrince/experiment_1/english_merged.txt"
use_phonological: true
seed: 42

encoder_type: bilstm
decoder_type: moe_lstm
use_slots: false
use_copy: false

# Encoder
d_model: 128
nhead: 4
enc_layers: 2
d_ff: 256
dropout: 0.3

# MoE decoder
num_experts: 4
expert_hidden: 64
routing_mode: soft
lambda_balance: 0.01
lambda_diversity: 0.1
dec_layers: 1
dec_bottleneck: 0

# Unused but required for model ctor
num_slots: 4
slot_iters: 3
slot_nhead: 1

# Training
training_regime: oversample
batch_size: 32
lr: 1.0e-3
weight_decay: 1.0e-4
epochs: 300
patience: 25

save_dir: "../checkpoints/v16d_moe_diversity"
results_dir: "../results/v16d_moe_diversity"
plot_every: 5
