# v18b: Population decoder with neuron dropout (synaptic pruning)
# Randomly masks neurons during training (p=0.5), forcing each to be
# independently competent. Prevents co-adaptation. Analogous to
# synaptic pruning during neural development.
data_path: "../data/RevisitPinkerAndPrince/experiment_1/english_merged.txt"
use_phonological: true
seed: 42

encoder_type: bilstm
decoder_type: population
use_slots: false
use_copy: false
confidence_mode: input

# Encoder
d_model: 128
nhead: 4
enc_layers: 2
d_ff: 256
dropout: 0.3

# Population decoder
num_experts: 4
expert_hidden: 64
neuron_dropout: 0.5
lambda_diversity: 0.1
lambda_balance: 0.0
dec_layers: 1
dec_bottleneck: 0

# Unused but required for model ctor
num_slots: 4
slot_iters: 3
slot_nhead: 1

# Training
training_regime: oversample
batch_size: 32
lr: 1.0e-3
weight_decay: 1.0e-4
epochs: 300
patience: 25

save_dir: "../checkpoints/v18b_population_dropout"
results_dir: "../results/v18b_population_dropout"
plot_every: 5
