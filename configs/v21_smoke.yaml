data_path: ../data/RevisitPinkerAndPrince/experiment_1/english_merged.txt
use_phonological: true
seed: 1

# v6 architecture (best of v20: noslot, d128, dropout 0.3, alpha 0.5)
use_slots: false
d_model: 128
nhead: 4
enc_layers: 2
dec_layers: 2
d_ff: 256
dropout: 0.3
use_copy: true
mono_alpha_init: 0.5

# Two-phase: small phase 1, then full
phase1_epochs: 3
phase1_regime: balanced
training_regime: natural

# tiny smoke test
batch_size: 32
lr: 3.0e-4
weight_decay: 1.0e-4
epochs: 6
patience: 0
plot_every: 1

save_dir: ../checkpoints/v21_smoke
results_dir: ../results/v21_smoke
