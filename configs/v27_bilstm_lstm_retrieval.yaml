# v27: biLSTM encoder + LSTM decoder + class-conditional retrieval.
# v10a (biLSTM+LSTM, no retrieval) baseline. Adds the retrieval channel
# v26a demonstrated works for the Transformer family. Tests whether the
# +25pp irregular gain transfers to the LSTM substrate.
data_path: "../data/RevisitPinkerAndPrince/experiment_1/english_merged.txt"
use_phonological: true
seed: 42
training_regime: oversample

encoder_type: bilstm
decoder_type: lstm
use_slots: false
use_copy: false

use_retrieval: true
retrieval_k: 5
use_class_retrieval: true

d_model: 128
nhead: 4
enc_layers: 2
dec_layers: 2
d_ff: 256
dropout: 0.3
lstm_hidden: 0

batch_size: 32
lr: 1.0e-3
weight_decay: 1.0e-4
epochs: 200
patience: 30

save_dir: "../checkpoints/v27_bilstm_lstm_retrieval"
results_dir: "../results/v27_bilstm_lstm_retrieval"
plot_every: 5
track_val_split: true
