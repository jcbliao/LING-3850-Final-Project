# v30a: biLSTM + LSTM + UNSUPERVISED cluster retrieval (true cluster).
#
# Same as v27 (best so far) but replaces the hand-coded English INFLECTION_CLASSES
# taxonomy with auto-derived clusters from the training-set alignment patterns.
#   derive_pattern_signature(src, tgt) returns the subsequence of non-COPY ops
#   from the Needleman-Wunsch alignment, and identical signatures form a cluster.
# 16 clusters auto-discovered from K&C train (vs 7 hand-coded). Verbs grouped
# purely by alignment shape — no morphology assumed, language-agnostic.
#
# Still uses TRUE cluster at val/test (small information leak via tgt — same as
# v27). v30b closes the leak via a learned cluster-predictor head.
data_path: "../data/RevisitPinkerAndPrince/experiment_1/english_merged.txt"
use_phonological: true
seed: 42
training_regime: oversample

encoder_type: bilstm
decoder_type: lstm
use_slots: false
use_copy: false

use_retrieval: true
retrieval_k: 5
retrieval_mode: cluster

d_model: 128
nhead: 4
enc_layers: 2
dec_layers: 2
d_ff: 256
dropout: 0.3
lstm_hidden: 0

batch_size: 32
lr: 1.0e-3
weight_decay: 1.0e-4
epochs: 200
patience: 30

save_dir: "../checkpoints/v30a_cluster_retrieval"
results_dir: "../results/v30a_cluster_retrieval"
plot_every: 5
track_val_split: true
