# v6: Monotonic copy attention + no slots
# Key fix: Gaussian positional bias in copy attention forces diagonal alignment
# This addresses the character scrambling caused by non-monotonic copy attention
data_path: "../data/RevisitPinkerAndPrince/experiment_1/english_merged.txt"
use_phonological: true
seed: 42

# No slot attention
use_slots: false

# Model
d_model: 128
nhead: 4
enc_layers: 2
dec_layers: 2
d_ff: 256
num_slots: 4
slot_iters: 3
dropout: 0.3

# Copy mechanism (with monotonic bias — built into decoder)
use_copy: true

alpha_recon: 0.0

# Training
batch_size: 32
lr: 3.0e-4
weight_decay: 1.0e-4
epochs: 200
patience: 25

# Output
save_dir: "../checkpoints/v6_monotonic_no_slots"
results_dir: "../results/v6_monotonic_no_slots"
plot_every: 5
