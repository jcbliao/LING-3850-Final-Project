# v6 orthographic: Monotonic copy, no slots, orthographic (not phonological)
# Tests whether standard English spelling is easier to learn than DISC
data_path: "../data/RevisitPinkerAndPrince/experiment_1/english_merged.txt"
use_phonological: false
seed: 42

use_slots: false
d_model: 128
nhead: 4
enc_layers: 2
dec_layers: 2
d_ff: 256
dropout: 0.3
use_copy: true
alpha_recon: 0.0

batch_size: 32
lr: 3.0e-4
weight_decay: 1.0e-4
epochs: 200
patience: 25

save_dir: "../checkpoints/v6_orthographic"
results_dir: "../results/v6_orthographic"
plot_every: 5
