# v7c: LSTM decoder, 2 layers, lower LR, fixed padding mask
# Fixes from v7a: padding mask in attention, 2 LSTM layers, lower LR
data_path: "../data/RevisitPinkerAndPrince/experiment_1/english_merged.txt"
use_phonological: true
seed: 42

decoder_type: lstm
use_slots: false
use_copy: false

d_model: 128
nhead: 4
enc_layers: 2
dec_layers: 2
d_ff: 256
dropout: 0.3
alpha_recon: 0.0

batch_size: 32
lr: 1.0e-3
weight_decay: 1.0e-4
epochs: 300
patience: 30

save_dir: "../checkpoints/v7c_lstm_2layer"
results_dir: "../results/v7c_lstm_2layer"
plot_every: 5
