# v8a: Bigger LSTM — d_model=256, 2 layers, no slots
# Tests whether more capacity closes the gap with Transformer+copy
data_path: "../data/RevisitPinkerAndPrince/experiment_1/english_merged.txt"
use_phonological: true
seed: 42

decoder_type: lstm
use_slots: false
use_copy: false

d_model: 256
nhead: 4
enc_layers: 2
dec_layers: 2
d_ff: 512
dropout: 0.3
alpha_recon: 0.0

batch_size: 32
lr: 1.0e-3
weight_decay: 1.0e-4
epochs: 300
patience: 30

save_dir: "../checkpoints/v8a_lstm_big"
results_dir: "../results/v8a_lstm_big"
plot_every: 5
