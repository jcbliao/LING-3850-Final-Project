# v8b: Bigger LSTM + slot attention
data_path: "../data/RevisitPinkerAndPrince/experiment_1/english_merged.txt"
use_phonological: true
seed: 42

decoder_type: lstm
use_slots: true
use_copy: false

d_model: 256
nhead: 4
enc_layers: 2
dec_layers: 2
d_ff: 512
num_slots: 8
slot_iters: 3
slot_nhead: 4
dropout: 0.3

l0_mode: conditional
target_l0: 4.0
lagrangian_lr: 0.01
l0_beta: 0.66

alpha_recon: 0.0

batch_size: 32
lr: 1.0e-3
weight_decay: 1.0e-4
epochs: 300
patience: 30

save_dir: "../checkpoints/v8b_lstm_big_slots"
results_dir: "../results/v8b_lstm_big_slots"
plot_every: 5
