# v9a: LSTM decoder with copy mechanism, no slots
# Combines LSTM sequential state (good for irregulars) with copy (good for regulars)
data_path: "../data/RevisitPinkerAndPrince/experiment_1/english_merged.txt"
use_phonological: true
seed: 42

decoder_type: lstm
use_slots: false
use_copy: true

d_model: 128
nhead: 4
enc_layers: 2
dec_layers: 2
d_ff: 256
dropout: 0.3
alpha_recon: 0.0

batch_size: 32
lr: 1.0e-3
weight_decay: 1.0e-4
epochs: 300
patience: 30

save_dir: "../checkpoints/v9a_lstm_copy"
results_dir: "../results/v9a_lstm_copy"
plot_every: 5
